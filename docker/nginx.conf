server {
    listen 80;
    server_name localhost;
    root /usr/share/nginx/html;
    index index.html;

    # Serve audio files (OGG)
    location /audiofiles/ {
        alias /data/audiofiles/;
        add_header Accept-Ranges bytes;
    }

    # Serve text files
    location /text/ {
        alias /data/text/;
    }

    # /play/123 -> index.html (SPA routing)
    location /play/ {
        try_files $uri /index.html;
    }

    location / {
        try_files $uri $uri/ /index.html;
    }
}
